services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      API_SERVER_URL: ${API_SERVER_URL:-https://api.stingle.org}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

